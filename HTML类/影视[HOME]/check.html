<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#171b20">
  <title>网盘检测测试</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #171b20;
      --panel: rgba(35, 42, 50, .86);
      --panel-2: rgba(43, 51, 60, .9);
      --text: #f5f7fb;
      --muted: rgba(229, 235, 242, .68);
      --line: rgba(255, 255, 255, .14);
      --ok: #73d58b;
      --bad: #ef8585;
      --locked: #ffd166;
      --uncertain: #7cc7ff;
      --unsupported: #b5a7ff;
      --radius: 8px;
      --fm-web-height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: var(--fm-web-height);
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    body {
      padding: max(14px, env(safe-area-inset-top)) 14px calc(22px + env(safe-area-inset-bottom));
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      color: inherit;
    }

    button {
      border: 0;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    .app {
      max-width: 1180px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 21px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .sdk {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      padding: 7px 10px;
      border-radius: var(--radius);
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--bad);
      box-shadow: 0 0 0 3px rgba(239, 133, 133, .12);
    }

    .dot.ok {
      background: var(--ok);
      box-shadow: 0 0 0 3px rgba(115, 213, 139, .14);
    }

    .panel {
      border-radius: var(--radius);
      background: var(--panel);
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      padding: 12px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .btn,
    .field,
    .select {
      min-height: 38px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .06);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 12px;
      font-weight: 760;
      font-size: 13px;
    }

    .btn.primary { background: rgba(91, 157, 255, .22); }
    .btn.ok { background: rgba(115, 213, 139, .18); }
    .btn.warn { background: rgba(255, 209, 102, .16); }

    .field,
    .select {
      padding: 0 10px;
      outline: none;
    }

    .field.number {
      width: 76px;
      text-align: center;
    }

    .endpoint {
      width: min(100%, 420px);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 12px;
      border-top: 1px solid var(--line);
      background: rgba(0, 0, 0, .1);
    }

    .metric {
      min-height: 58px;
      padding: 10px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .05);
      border: 1px solid rgba(255, 255, 255, .09);
    }

    .metric b {
      display: block;
      font-size: 18px;
      line-height: 1.1;
    }

    .metric span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .progress {
      height: 4px;
      background: rgba(255, 255, 255, .08);
      overflow: hidden;
    }

    .progress > i {
      display: block;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #73d58b, #7cc7ff);
      transition: width .18s ease;
    }

    .groups {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 0 12px 12px;
      scrollbar-width: none;
    }

    .groups::-webkit-scrollbar { display: none; }

    .chip {
      flex: 0 0 auto;
      min-height: 32px;
      padding: 0 10px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .05);
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
    }

    .chip.active {
      color: var(--text);
      border-color: rgba(124, 199, 255, .5);
      background: rgba(124, 199, 255, .15);
    }

    .table {
      display: grid;
      overflow: hidden;
    }

    .head,
    .item {
      display: grid;
      grid-template-columns: 34px 76px minmax(180px, 1fr) 94px 72px 86px minmax(120px, .7fr);
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
    }

    .head {
      position: sticky;
      top: 0;
      z-index: 2;
      background: rgba(28, 34, 41, .96);
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
    }

    .item {
      min-height: 72px;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
    }

    .item:last-child { border-bottom: 0; }

    .url {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .url a {
      color: var(--text);
      text-decoration: none;
      overflow-wrap: anywhere;
      line-height: 1.25;
      font-size: 12px;
    }

    .url small,
    .muted {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .badge {
      width: fit-content;
      min-width: 58px;
      min-height: 28px;
      display: inline-grid;
      place-items: center;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .08);
      color: var(--muted);
      font-size: 12px;
      font-weight: 860;
      text-transform: uppercase;
    }

    .badge.ok { color: var(--ok); background: rgba(115, 213, 139, .13); }
    .badge.bad { color: var(--bad); background: rgba(239, 133, 133, .13); }
    .badge.locked { color: var(--locked); background: rgba(255, 209, 102, .13); }
    .badge.uncertain { color: var(--uncertain); background: rgba(124, 199, 255, .13); }
    .badge.unsupported { color: var(--unsupported); background: rgba(181, 167, 255, .13); }
    .badge.error { color: var(--bad); background: rgba(239, 133, 133, .13); }
    .badge.running { color: var(--uncertain); background: rgba(124, 199, 255, .13); }

    .check {
      width: 18px;
      height: 18px;
      accent-color: #7cc7ff;
    }

    .log {
      min-height: 120px;
      max-height: 220px;
      overflow: auto;
      padding: 12px;
      margin: 0;
      color: rgba(229, 235, 242, .78);
      font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    @media (max-width: 860px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .head { display: none; }
      .item {
        grid-template-columns: 28px minmax(0, 1fr) 86px;
        gap: 8px;
      }
      .item > :nth-child(2),
      .item > :nth-child(5),
      .item > :nth-child(6) { display: none; }
      .item > :nth-child(4) { justify-self: start; }
      .item > :nth-child(7) { grid-column: 2 / 4; }
    }

    @media (min-width: 720px) {
      .summary { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <h1>网盘检测测试</h1>
      <div class="sdk"><span class="dot" id="sdkDot"></span><span id="sdkText">SDK 检测中</span></div>
    </div>

    <section class="panel">
      <div class="controls">
        <div class="row">
          <button class="btn primary" id="runBatchBtn" type="button">单批检测</button>
          <button class="btn ok" id="runConcurrentBtn" type="button">并发检测</button>
          <button class="btn warn" id="runSelectedBtn" type="button">检测选中</button>
          <button class="btn" id="stopBtn" type="button">停止</button>
          <button class="btn" id="resetBtn" type="button">重置</button>
          <button class="btn" id="exportBtn" type="button">导出</button>
        </div>
        <div class="row">
          <select class="select" id="modeSelect">
            <option value="all">全部网盘</option>
          </select>
          <select class="select" id="stateSelect">
            <option value="all">全部状态</option>
            <option value="idle">未检测</option>
            <option value="ok">ok</option>
            <option value="bad">bad</option>
            <option value="locked">locked</option>
            <option value="uncertain">uncertain</option>
            <option value="unsupported">unsupported</option>
            <option value="error">error</option>
          </select>
          <span class="muted">并发</span>
          <input class="field number" id="concurrencyInput" type="number" min="1" max="20" value="5">
          <span class="muted">轮数</span>
          <input class="field number" id="roundInput" type="number" min="1" max="20" value="1">
          <input class="field endpoint" id="endpointInput" type="url" value="http://127.0.0.1:9978/pan/check">
        </div>
      </div>
      <div class="progress"><i id="progressBar"></i></div>
      <div class="summary">
        <div class="metric"><b id="metricTotal">0/0</b><span>完成</span></div>
        <div class="metric"><b id="metricStates">0 / 0 / 0</b><span>ok / bad / locked</span></div>
        <div class="metric"><b id="metricOther">0 / 0</b><span>uncertain / error</span></div>
        <div class="metric"><b id="metricCache">0</b><span>缓存命中</span></div>
        <div class="metric"><b id="metricTime">0 ms</b><span>耗时</span></div>
      </div>
      <div class="groups" id="groups"></div>
    </section>

    <section class="panel table">
      <div class="head">
        <span><input class="check" id="selectAll" type="checkbox" checked></span>
        <span>类型</span>
        <span>链接</span>
        <span>状态</span>
        <span>缓存</span>
        <span>耗时</span>
        <span>说明</span>
      </div>
      <div id="list"></div>
    </section>

    <section class="panel">
      <pre class="log" id="log"></pre>
    </section>
  </main>

  <script>
    const TEST_ITEMS = [
      { group: "UC网盘", type: "uc", url: "https://drive.uc.cn/s/e1ebe95d144c4?public=1", note: "UC网盘有效" },
      { group: "UC网盘", type: "uc", url: "https://drive.uc.cn/s/m7and23e132a1?public=1", note: "UC网盘无效" },

      { group: "阿里云", type: "aliyun", url: "https://www.aliyundrive.com/s/hz1HHxhahsE", note: "aliyundrive 公开分享" },
      { group: "阿里云", type: "aliyun", url: "https://www.alipan.com/s/QbaHJ71QjV1", note: "alipan 公开分享" },
      { group: "阿里云", type: "aliyun", url: "https://www.alipan.com/s/GMrv1QCZhNB", note: "带提取码" },
      { group: "阿里云", type: "aliyun", url: "https://www.aliyundrive.com/s/p51zbVtgmy", note: "链接错误 NotFound.ShareLink" },
      { group: "阿里云", type: "aliyun", url: "https://www.aliyundrive.com/s/hZnj4qLMMd9", note: "空文件" },

      { group: "115", type: "115", url: "https://115cdn.com/s/swh88n13z72?password=r9b2#", password: "r9b2", note: "带访问码" },
      { group: "115", type: "115", url: "https://anxia.com/s/swhm75q3z5o?password=ayss", password: "ayss", note: "anxia 域名" },
      { group: "115", type: "115", url: "https://115.com/s/swhsaua36a1?password=oc92", password: "oc92", note: "带访问码" },
      { group: "115", type: "115", url: "https://115.com/s/sw313r03zx1", note: "分享的文件涉嫌违规，链接已失效" },
      { group: "115", type: "115", url: "https://115cdn.com/s/swfpfed3zrk?password=t58d", password: "t58d", note: "115 测试" },
      { group: "115", type: "115", url: "https://115cdn.com/s/swfafmu3zrk?password=t58d", password: "t58d", note: "115 测试" },
      { group: "115", type: "115", url: "https://115cdn.com/s/swfafm03zrk?password=t58d", password: "t58d", note: "115 测试" },

      { group: "夸克", type: "quark", url: "https://pan.quark.cn/s/9803af406f13", note: "公开分享" },
      { group: "夸克", type: "quark", url: "https://pan.quark.cn/s/f161a5364657", note: "提取码" },
      { group: "夸克", type: "quark", url: "https://pan.quark.cn/s/9803af406f15", note: "分享不存在" },
      { group: "夸克", type: "quark", url: "https://pan.quark.cn/s/b999385c0936", note: "违规" },
      { group: "夸克", type: "quark", url: "https://pan.quark.cn/s/c66f71b6f7d5", note: "取消分享" },

      { group: "123", type: "123", url: "https://www.123pan.com/s/i4uaTd-WHn0", note: "公开分享" },
      { group: "123", type: "123", url: "https://www.123912.com/s/U8f2Td-ZeOX", note: "123912 域名" },
      { group: "123", type: "123", url: "https://www.123684.com/s/u9izjv-k3uWv", note: "123684 域名" },
      { group: "123", type: "123", url: "https://www.123pan.com/s/A6cA-AKH11", note: "外链不存在" },

      { group: "天翼", type: "tianyi", url: "https://cloud.189.cn/t/viy2quQzMBne", note: "公开分享" },
      { group: "天翼", type: "tianyi", url: "https://cloud.189.cn/web/share?code=UfUjiiFRbymq", note: "带密码分享长链接" },
      { group: "天翼", type: "tianyi", url: "https://cloud.189.cn/t/vENFvuVNbyqa", note: "外链不存在" },
      { group: "天翼", type: "tianyi", url: "https://cloud.189.cn/t/notexist", note: "分享不存在" },

      { group: "百度", type: "baidu", url: "https://pan.baidu.com/s/1rIcc6X7D3rVzNSqivsRejw?pwd=0w0j", password: "0w0j", note: "带提取码分享" },
      { group: "百度", type: "baidu", url: "https://pan.baidu.com/s/1TMhfQ5yNnlPPSGbw4RQ-LA?pwd=6j77", password: "6j77", note: "带提取码分享" },
      { group: "百度", type: "baidu", url: "https://pan.baidu.com/s/1J_CUxLKqC0h3Ypg4sQV0_g", note: "无法识别" },
      { group: "百度", type: "baidu", url: "https://pan.baidu.com/s/1HlvGfj8qVUBym24X2I9ukA", note: "分享被和谐" },
      { group: "百度", type: "baidu", url: "https://pan.baidu.com/s/1cgsY10lkrPGZ-zt8oVdR_w", note: "分享已过期" },
      { group: "百度", type: "baidu", url: "https://pan.baidu.com/s/1R_itrvmA0ZyMMaHybg7G2Q", note: "分享已删除" },
      { group: "百度", type: "baidu", url: "https://pan.baidu.com/s/1hqge8hI", note: "分享链接错误" },
      { group: "百度", type: "baidu", url: "https://pan.baidu.com/s/1notexist", note: "分享不存在" }
    ].map((item, index) => ({
      id: index + 1,
      password: "",
      selected: true,
      state: "idle",
      summary: "",
      cache_hit: false,
      elapsed: 0,
      raw: null,
      error: "",
      ...item
    }));

    const $ = (id) => document.getElementById(id);
    const state = {
      items: TEST_ITEMS,
      activeGroup: "all",
      stateFilter: "all",
      running: false,
      abort: false,
      startedAt: 0,
      totalJobs: 0,
      doneJobs: 0,
      lastExport: null
    };

    function init() {
      renderGroups();
      renderRows();
      bind();
      waitForSdk();
      updateMetrics();
    }

    function bind() {
      $("runBatchBtn").addEventListener("click", () => runBatch(getFilteredItems()));
      $("runConcurrentBtn").addEventListener("click", () => runConcurrent(expandRounds(getFilteredItems()), getConcurrency()));
      $("runSelectedBtn").addEventListener("click", () => runConcurrent(expandRounds(getFilteredItems().filter((item) => item.selected)), getConcurrency()));
      $("stopBtn").addEventListener("click", () => {
        state.abort = true;
        log("停止信号已发送，正在等待当前请求结束");
      });
      $("resetBtn").addEventListener("click", reset);
      $("exportBtn").addEventListener("click", exportJson);
      $("modeSelect").addEventListener("change", () => {
        state.activeGroup = $("modeSelect").value;
        renderGroups();
        renderRows();
      });
      $("stateSelect").addEventListener("change", () => {
        state.stateFilter = $("stateSelect").value;
        renderRows();
      });
      $("selectAll").addEventListener("change", () => {
        const checked = $("selectAll").checked;
        getFilteredItems().forEach((item) => item.selected = checked);
        renderRows();
      });
    }

    function waitForSdk() {
      let attempts = 0;
      const tick = () => {
        attempts += 1;
        const ready = !!getPanChecker();
        $("sdkDot").className = "dot" + (ready ? " ok" : "");
        $("sdkText").textContent = ready ? "App SDK fm.pan.check 已连接" : "浏览器 / HTTP 模式";
        if (!ready && attempts < 40) setTimeout(tick, 250);
      };
      tick();
    }

    function renderGroups() {
      const groups = ["all"].concat(Array.from(new Set(state.items.map((item) => item.group))));
      $("modeSelect").replaceChildren(...groups.map((group) => {
        const option = document.createElement("option");
        option.value = group;
        option.textContent = group === "all" ? "全部网盘" : group;
        option.selected = group === state.activeGroup;
        return option;
      }));
      $("groups").replaceChildren(...groups.map((group) => {
        const button = document.createElement("button");
        button.className = "chip" + (group === state.activeGroup ? " active" : "");
        button.type = "button";
        button.textContent = group === "all" ? `全部 ${state.items.length}` : `${group} ${state.items.filter((item) => item.group === group).length}`;
        button.addEventListener("click", () => {
          state.activeGroup = group;
          $("modeSelect").value = group;
          renderGroups();
          renderRows();
        });
        return button;
      }));
    }

    function renderRows() {
      const rows = getFilteredItems();
      $("list").replaceChildren(...rows.map((item) => {
        const row = document.createElement("div");
        row.className = "item";
        row.dataset.id = item.id;
        row.innerHTML = `
          <span><input class="check row-check" type="checkbox" ${item.selected ? "checked" : ""}></span>
          <span><span class="badge">${escapeHtml(item.type)}</span></span>
          <span class="url">
            <a href="${escapeAttr(item.url)}">${escapeHtml(item.url)}</a>
            <small>${escapeHtml(item.group)} · ${escapeHtml(item.note || "")}${item.password ? " · pwd " + escapeHtml(item.password) : ""}</small>
          </span>
          <span><span class="badge ${escapeAttr(item.state)}">${escapeHtml(item.state)}</span></span>
          <span class="muted">${item.cache_hit ? "hit" : "-"}</span>
          <span class="muted">${item.elapsed ? item.elapsed + " ms" : "-"}</span>
          <span class="muted">${escapeHtml(item.error || item.summary || "")}</span>
        `;
        row.querySelector(".row-check").addEventListener("change", (event) => {
          item.selected = event.target.checked;
          updateMetrics();
        });
        return row;
      }));
      updateMetrics();
    }

    function updateRow(item) {
      const row = document.querySelector(`.item[data-id="${item.id}"]`);
      if (!row) return;
      const badge = row.children[3].querySelector(".badge");
      badge.className = "badge " + item.state;
      badge.textContent = item.state;
      row.children[4].textContent = item.cache_hit ? "hit" : "-";
      row.children[5].textContent = item.elapsed ? item.elapsed + " ms" : "-";
      row.children[6].textContent = item.error || item.summary || "";
      updateMetrics();
    }

    function getFilteredItems() {
      return state.items.filter((item) => {
        if (state.activeGroup !== "all" && item.group !== state.activeGroup) return false;
        if (state.stateFilter !== "all" && item.state !== state.stateFilter) return false;
        return true;
      });
    }

    function expandRounds(items) {
      const rounds = Math.max(1, Math.min(20, Number($("roundInput").value || 1)));
      const jobs = [];
      for (let round = 0; round < rounds; round += 1) {
        items.forEach((item) => jobs.push({ item, round }));
      }
      return jobs;
    }

    function getConcurrency() {
      return Math.max(1, Math.min(20, Number($("concurrencyInput").value || 1)));
    }

    async function runBatch(items) {
      if (!items.length || state.running) return;
      startRun(items.length);
      items.forEach((item) => {
        item.state = "running";
        item.error = "";
        item.elapsed = 0;
        updateRow(item);
      });
      const start = performance.now();
      try {
        const response = await checkItems(items.map(toPayload));
        const results = response.results || [];
        results.forEach((result, index) => applyResult(items[index], result, Math.round(performance.now() - start)));
        state.doneJobs = items.length;
        log(`单批完成：${items.length} 条，${Math.round(performance.now() - start)} ms`);
      } catch (error) {
        items.forEach((item) => applyError(item, error));
        log("单批失败：" + errorMessage(error));
      } finally {
        finishRun();
      }
    }

    async function runConcurrent(jobs, concurrency) {
      if (!jobs.length || state.running) return;
      startRun(jobs.length);
      let cursor = 0;
      const workers = Array.from({ length: Math.min(concurrency, jobs.length) }, async () => {
        while (!state.abort) {
          const job = jobs[cursor++];
          if (!job) return;
          await runOne(job.item, job.round);
          state.doneJobs += 1;
          updateMetrics();
        }
      });
      await Promise.all(workers);
      finishRun();
      log(`并发结束：完成 ${state.doneJobs}/${state.totalJobs}，并发 ${concurrency}`);
    }

    async function runOne(item, round) {
      const start = performance.now();
      item.state = "running";
      item.error = "";
      item.elapsed = 0;
      updateRow(item);
      try {
        const response = await checkItems([toPayload(item)]);
        const result = response.results && response.results[0];
        applyResult(item, result, Math.round(performance.now() - start));
        if (round > 0) item.summary = `${item.summary || ""} · round ${round + 1}`;
      } catch (error) {
        applyError(item, error);
      }
      updateRow(item);
    }

    function getPanChecker() {
      if (window.fm && window.fm.pan && window.fm.pan.check) return window.fm.pan.check.bind(window.fm.pan);
      if (window.fongmi && window.fongmi.pan && window.fongmi.pan.check) return window.fongmi.pan.check.bind(window.fongmi.pan);
      return null;
    }

    async function checkItems(items) {
      const check = getPanChecker();
      if (check) return await check(items);
      const endpoint = $("endpointInput").value.trim();
      const response = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ items })
      });
      const text = await response.text();
      let body;
      try { body = text ? JSON.parse(text) : {}; } catch (e) { body = { message: text }; }
      if (!response.ok) throw new Error(body.message || "HTTP " + response.status);
      return body;
    }

    function toPayload(item) {
      return { type: item.type, url: item.url, password: item.password || "" };
    }

    function applyResult(item, result, elapsed) {
      item.raw = result || null;
      item.state = result && result.state || "uncertain";
      item.summary = result && result.summary || "无返回说明";
      item.cache_hit = !!(result && result.cache_hit);
      item.elapsed = elapsed;
      item.error = "";
      updateRow(item);
    }

    function applyError(item, error) {
      item.raw = null;
      item.state = "error";
      item.summary = "";
      item.cache_hit = false;
      item.elapsed = 0;
      item.error = errorMessage(error);
      updateRow(item);
    }

    function startRun(total) {
      state.running = true;
      state.abort = false;
      state.startedAt = performance.now();
      state.totalJobs = total;
      state.doneJobs = 0;
      log(`开始检测：${total} 个任务`);
      updateMetrics();
    }

    function finishRun() {
      state.running = false;
      updateMetrics();
    }

    function reset() {
      state.abort = true;
      state.running = false;
      state.totalJobs = 0;
      state.doneJobs = 0;
      state.startedAt = 0;
      state.items.forEach((item) => {
        item.state = "idle";
        item.summary = "";
        item.cache_hit = false;
        item.elapsed = 0;
        item.raw = null;
        item.error = "";
      });
      renderRows();
      log("已重置");
    }

    function updateMetrics() {
      const items = state.items;
      const done = items.filter((item) => !["idle", "running"].includes(item.state)).length;
      const count = (name) => items.filter((item) => item.state === name).length;
      const elapsed = state.startedAt ? Math.round(performance.now() - state.startedAt) : 0;
      const total = state.running ? state.totalJobs : items.length;
      const progress = state.running && total ? state.doneJobs / total : done / items.length;
      $("metricTotal").textContent = state.running ? `${state.doneJobs}/${state.totalJobs}` : `${done}/${items.length}`;
      $("metricStates").textContent = `${count("ok")} / ${count("bad")} / ${count("locked")}`;
      $("metricOther").textContent = `${count("uncertain") + count("unsupported")} / ${count("error")}`;
      $("metricCache").textContent = String(items.filter((item) => item.cache_hit).length);
      $("metricTime").textContent = elapsed + " ms";
      $("progressBar").style.width = `${Math.max(0, Math.min(1, progress || 0)) * 100}%`;
    }

    function exportJson() {
      const data = {
        exported_at: new Date().toISOString(),
        results: state.items.map((item) => ({
          id: item.id,
          group: item.group,
          type: item.type,
          url: item.url,
          password: item.password || "",
          note: item.note,
          state: item.state,
          summary: item.summary,
          cache_hit: item.cache_hit,
          elapsed: item.elapsed,
          error: item.error,
          raw: item.raw
        }))
      };
      state.lastExport = data;
      log(JSON.stringify(data, null, 2));
    }

    function log(message) {
      const time = new Date().toLocaleTimeString();
      $("log").textContent = `[${time}] ${message}\n` + $("log").textContent;
    }

    function errorMessage(error) {
      return error && (error.message || String(error)) || "检测失败";
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }

    init();
  </script>
</body>
</html>
