<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>美剧迷网盘源</title>
<style>
:root{--panel-rgb:42,50,58;--panel:rgba(var(--panel-rgb),.62);--soft:rgba(var(--panel-rgb),.44);--text:#f7fbff;--muted:rgba(247,251,255,.68);--line:rgba(255,255,255,.16);--accent:#ff6b35;--accent2:#ffb86b;--radius:16px}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:transparent;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif}html:not(.fm-native),html:not(.fm-native) body{background:#222a32}.app{min-height:100vh;padding:10px 10px 28px}.bar{display:flex;align-items:center;gap:8px}.brand{font-size:21px;font-weight:900;white-space:nowrap}.brand b{color:var(--accent2)}.search{flex:1;display:flex;gap:8px;align-items:center;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:6px 7px 6px 13px}.search input{flex:1;min-width:0;background:transparent;border:0;outline:0;color:var(--text);font-size:15px}.search button,.btn{border:1px solid var(--line);background:var(--soft);color:var(--text);border-radius:999px;padding:8px 12px;font-size:14px}.search button{border-color:rgba(255,107,53,.45);background:linear-gradient(135deg,rgba(255,107,53,.9),rgba(255,184,107,.72));color:#17110d;font-weight:800}.tabs{display:flex;gap:8px;overflow:auto;padding:10px 2px 0;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{white-space:nowrap;border-radius:999px;padding:8px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:var(--muted)}.tab.active{background:linear-gradient(135deg,rgba(255,107,53,.55),rgba(255,184,107,.3));color:var(--text);border-color:rgba(255,184,107,.58);font-weight:800}.status{margin:10px 2px;color:var(--muted);font-size:14px}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.card{border-radius:15px;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.045));border:1px solid rgba(255,255,255,.12);cursor:pointer}.poster{aspect-ratio:3/4;background:rgba(255,255,255,.08);position:relative}.poster img{width:100%;height:100%;object-fit:cover;display:block}.poster .noimg{height:100%;display:grid;place-items:center;color:var(--muted);font-size:28px}.tag{position:absolute;right:7px;top:7px;padding:3px 8px;border-radius:999px;background:rgba(0,0,0,.58);font-size:11px;font-weight:800}.meta{padding:8px 8px 10px}.name{font-weight:800;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.remark{margin-top:4px;color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sheet{position:fixed;inset:0;z-index:40;display:none;background:transparent;overflow:auto;padding:12px}.sheet.active{display:block}.panel{background:linear-gradient(135deg,rgba(64,35,30,.72),rgba(30,24,24,.58));border:1px solid rgba(255,255,255,.10);border-radius:22px;padding:16px 12px 24px;margin-bottom:42px}.head{display:grid;grid-template-columns:38% 1fr;gap:14px}.pic{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:16px;background:rgba(255,255,255,.08)}.title{font-size:22px;font-weight:700;line-height:1.25;margin:0 0 8px}.info{font-size:14px;line-height:1.65;color:rgba(255,255,255,.75);max-height:190px;overflow:hidden}.pill{display:inline-block;margin:18px 0 10px;padding:8px 18px;border-radius:999px;background:rgba(255,255,255,.10);border:1px solid rgba(255,184,107,.55);font-size:15px;font-weight:800}.desc{font-size:15px;line-height:1.75;color:rgba(255,255,255,.72)}.group-title{margin:16px 0 8px;font-size:16px;font-weight:900}.eps{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:9px}.ep{border-radius:12px;padding:10px 5px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.9);font-size:13px;text-align:center;min-height:42px}.ep.baidu{border-color:rgba(91,141,255,.45)}.ep.quark{border-color:rgba(55,188,255,.45)}.ep.xunlei{border-color:rgba(123,92,255,.45)}.ep.magnet{border-color:rgba(220,120,255,.45)}.empty{padding:34px 18px;text-align:center;color:var(--muted);background:var(--soft);border:1px dashed var(--line);border-radius:var(--radius)}.pager{display:flex;gap:8px;justify-content:center;margin:14px 0}.pager button{padding:8px 16px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid var(--line);color:var(--text)}@media(min-width:720px){.grid{grid-template-columns:repeat(5,minmax(0,1fr))}.app{padding:18px 28px 44px}.head{grid-template-columns:180px 1fr}.pic{width:180px}.eps{grid-template-columns:repeat(5,minmax(0,1fr))}}@media(min-width:1100px){.grid{grid-template-columns:repeat(7,minmax(0,1fr))}.app{max-width:1380px;margin:0 auto}.sheet{max-width:1180px;margin:0 auto}}
</style>
</head>
<body>
<div class="app">
<div class="bar"><div class="brand">美剧<b>迷</b></div><form class="search" id="searchForm"><input id="kw" placeholder="搜索美剧、英剧、韩剧…"><button>搜索</button></form></div>
<div class="tabs" id="tabs"></div>
<div class="status" id="status">准备加载…</div>
<main id="content"></main>
</div>
<div class="sheet" id="sheet"><div class="panel" id="panel"></div></div>
<script>
(function(){
'use strict';
if(window.fongmiBridge||window.fm)document.documentElement.classList.add('fm-native');
const BASE='https://www.meijumi.net';
const UA='Mozilla/5.0 (Linux; Android 13) AppleWebKit/537.36 Chrome/120 Mobile Safari/537.36';
const CATS=[['首页','/'],['灵异/惊悚','/usa/xuanyi/'],['魔幻/科幻','/usa/mohuan/'],['罪案/动作','/usa/zuian/'],['剧情/历史','/usa/qinggan/'],['喜剧','/usa/xiju/'],['律政/医务','/usa/yiwu/'],['动漫/动画','/usa/katong/'],['纪录片','/usa/jilu/'],['综艺','/usa/zongyi/'],['英剧','/en/'],['韩剧','/hanju/'],['最近更新','/news/'],['好剧推荐','/zixun/haoju/'],['2026新剧','/2026xinju/'],['即将播出','/jijiangbochu/']];
let current=BASE+'/',page=1,active='';
const $=s=>document.querySelector(s),status=$('#status'),content=$('#content'),tabs=$('#tabs');
function abs(u){try{return new URL(u,BASE+'/').href}catch(e){return u||''}}
function esc(s){return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'"'}[c]))}
function clean(s){return String(s||'').replace(/\s+/g,' ').replace(/\u00a0/g,' ').trim()}
function text(el){return clean(el&&el.textContent)}
function decode(s){const t=document.createElement('textarea');t.innerHTML=s||'';return t.value}
async function req(url){url=abs(url);status.textContent='加载：'+url;if(window.fm&&fm.req){const r=await fm.req(url,{method:'GET',headers:{'User-Agent':UA,'Referer':BASE+'/'},responseType:'text',timeout:25});if(!r.ok)throw new Error(r.error||('HTTP '+r.status));return r.body||''}const r=await fetch(url,{headers:{'User-Agent':UA,'Referer':BASE+'/'}});return await r.text()}
function doc(h){return new DOMParser().parseFromString(h,'text/html')}
function catId(u){let p=new URL(abs(u)).pathname;let c=CATS.find(x=>abs(x[1]).replace(BASE,'')===p);return c?c[1]:p.split('/').filter(Boolean).slice(0,2).join('/')}
function renderTabs(){let id=catId(current);tabs.innerHTML=CATS.map(([n,p])=>`<button class="tab ${catId(p)===id?'active':''}" data-url="${esc(abs(p))}">${esc(n)}</button>`).join('');tabs.querySelectorAll('.tab').forEach(b=>b.onclick=()=>loadPage(b.dataset.url))}
function posterFrom(a){let img=a.querySelector('img')||a.closest('.item,.xpic,.related_box,.jinri,.top_post_item')?.querySelector('img');let pic=img?(img.getAttribute('data-src')||img.getAttribute('src')||''):'';return abs(pic)}
function cardFromA(a){let href=abs(a.getAttribute('href')||''),img=a.querySelector('img'),box=a.closest('.item,.xpic,.related_box,.jinri,.top_post_item,article')||a.parentElement;let title=decode(a.getAttribute('title')||img?.getAttribute('alt')||text(a.querySelector('.txt,.r_title,.kankan,ul'))||text(a));title=clean(title).replace(/\s*迅雷下载.*$/,' 迅雷下载');let remark=text(box).replace(title,'').replace(/阅读全文|评论|赞|浏览/g,'').slice(0,48);return{href,title,remark,image:posterFrom(a)}}
function unique(arr){const m=new Map();arr.forEach(x=>{if(x&&x.href&&x.title&&!m.has(x.href)&&/\/\d+\.html/.test(x.href))m.set(x.href,x)});return[...m.values()]}
function parseList(html,kw){const d=doc(html);let nodes=[...d.querySelectorAll('.cat-box .item>a,.cat-list .xpic a[href$=".html"],.related_box>a,.jinri,.top_post_item,article .entry-title a,.post a[href$=".html"],a[href$=".html"]')];let bad=a=>!!a.closest('#sidebar,.footer-2,#comments,.top-nav,.menu-box,.breadcrumb,.related_posts')&&!a.closest('.jinri,.top_post_item');let items=unique(nodes.filter(a=>!bad(a)).map(cardFromA)).filter(x=>/下载|Season|第一|第二|第三|第四|第五|第六|全集|美剧|英剧|韩剧/.test(x.title+x.remark));if(kw)items=items.filter(x=>x.title.includes(kw)||x.remark.includes(kw));return items.slice(0,60)}
function parsePager(html,url){const d=doc(html);let prev='',next='';[...d.querySelectorAll('.pagination a,.page-numbers,a')].forEach(a=>{let t=text(a),h=a.getAttribute('href');if(!h)return;if(/下一页|下页|Next|›|»/.test(t))next=abs(h);if(/上一页|上页|Prev|‹|«/.test(t))prev=abs(h)});if(!next&&!/\?s=/.test(url)){let u=new URL(abs(url)),p=u.pathname;if(/\/page\/\d+\/?$/.test(p)){let n=parseInt((p.match(/\/page\/(\d+)/)||[])[1])||1;next=BASE+p.replace(/\/page\/\d+\/?$/,'/page/'+(n+1)+'/');if(n>2)prev=BASE+p.replace(/\/page\/\d+\/?$/,'/page/'+(n-1)+'/');else prev=BASE+p.replace(/\/page\/\d+\/?$/,'/')}else if(p!=='/'){next=BASE+p.replace(/\/?$/,'/page/2/')}}return{prev,next}}
function renderList(items){if(!items.length){content.innerHTML='<div class="empty">暂无内容</div>';return}content.innerHTML='<div class="grid">'+items.map(it=>`<article class="card" data-href="${esc(it.href)}"><div class="poster">${it.image?`<img loading="lazy" referrerpolicy="no-referrer" src="${esc(it.image)}">`:'<div class="noimg">美</div>'}<span class="tag">网盘</span></div><div class="meta"><div class="name">${esc(it.title)}</div><div class="remark">${esc(it.remark||'点击查看资源')}</div></div></article>`).join('')+'</div>'+((window.__prev||window.__next)?`<div class="pager"><button ${!window.__prev?'disabled':''} id="prevBtn">上一页</button><button ${!window.__next?'disabled':''} id="nextBtn">下一页</button></div>`:'');content.querySelectorAll('.card').forEach(c=>c.onclick=()=>openDetail(c.dataset.href));let p=$('#prevBtn'),n=$('#nextBtn');if(p)p.onclick=()=>loadPage(window.__prev);if(n)n.onclick=()=>loadPage(window.__next)}
async function loadPage(url){current=abs(url);renderTabs();content.innerHTML='<div class="empty">加载中…</div>';try{let html=await req(current),kw=new URL(current).searchParams.get('s')||'';let pg=parsePager(html,current);window.__prev=pg.prev;window.__next=pg.next;let items=parseList(html,kw);renderList(items);status.textContent='已加载 '+items.length+' 条'}catch(e){content.innerHTML='<div class="empty">加载失败：'+esc(e.message)+'</div>';status.textContent='加载失败'}}
function panType(u,t){u=String(u||'').toLowerCase();t=String(t||'');if(u.includes('pan.baidu.com'))return'baidu';if(u.includes('pan.quark.cn'))return'quark';if(u.includes('pan.xunlei.com'))return'xunlei';if(u.startsWith('magnet:'))return'magnet';if(u.includes('aliyundrive')||u.includes('alipan'))return'aliyun';if(u.includes('115.com'))return'115';if(/百度/.test(t))return'baidu';if(/夸克/.test(t))return'quark';if(/迅雷/.test(t))return'xunlei';return'link'}
function panName(t){return{baidu:'百度盘',quark:'夸克盘',xunlei:'迅雷盘',magnet:'磁力',aliyun:'阿里盘','115':'115盘',link:'链接'}[t]||t}
function lineTitle(node){let s='',n=node.previousSibling;while(n){if(n.nodeType===3&&clean(n.textContent)){s=clean(n.textContent);break}if(n.nodeType===1){let tx=text(n);if(tx){s=tx;break}}n=n.previousSibling}let m=s.match(/(S\d+E\d+[^|\n<]*|第\d+集[^|\n<]*|\d{3,4}P[^|\n<]*)/i);return m?m[1].trim():''}
function parseDetail(html,url){const d=doc(html),article=d.querySelector('article')||d;let title=text(d.querySelector('h1.entry-title,h1'))||d.title.replace(/[-_].*$/,'');let img=article.querySelector('.single-content img,.entry-content-2 img,meta[property="og:image"]');let pic=img?(img.getAttribute('content')||img.getAttribute('src')||''):'';let desc=text(article.querySelector('blockquote'))||'';let info=[];[...article.querySelectorAll('table tr')].forEach(tr=>{let t=[...tr.querySelectorAll('td')].map(text).filter(Boolean);if(t.length>=2)info.push([t[0].replace(/[•：:]/g,'').trim(),t.slice(1).join(' ')])});let links=[];[...article.querySelectorAll('a[href]')].forEach(a=>{let href=decode(a.getAttribute('href')||''),tx=text(a);if(!/pan\.baidu|pan\.quark|pan\.xunlei|magnet:|aliyundrive|alipan|115\.com/i.test(href))return;let type=panType(href,tx),lt=lineTitle(a),pwd=(href.match(/[?&]pwd=([^&#]+)/)||[])[1]||'';links.push({title:(lt?lt+' · ':'')+panName(type)+(pwd?' · '+pwd:''),url:href,type,pwd})});let seen=new Set();links=links.filter(x=>{let k=x.title+'|'+x.url;if(seen.has(k))return false;seen.add(k);return true});return{title,pic:abs(pic),desc,info,links,url}}
async function openDetail(url){$('#sheet').classList.add('active');$('#panel').innerHTML='<div class="empty">读取详情…</div>';try{let html=await req(url),d=parseDetail(html,url);$('#panel').innerHTML=`<button class="btn" id="closeBtn">返回</button><div class="head"><img class="pic" referrerpolicy="no-referrer" src="${esc(d.pic)}" onerror="this.style.display='none'"><div><div class="title">${esc(d.title)}</div><div class="info">${d.info.map(x=>`<div><b>${esc(x[0])}：</b>${esc(x[1])}</div>`).join('')}</div></div></div><div class="pill">简介</div><div class="desc">${esc(d.desc||'暂无简介')}</div><div class="group-title">网盘资源 (${d.links.length})</div><div class="eps">${d.links.map((x,i)=>`<button class="ep ${esc(x.type)}" data-i="${i}">${esc(x.title)}</button>`).join('')||'<div class="empty">未提取到网盘链接</div>'}</div>`;$('#closeBtn').onclick=closeDetail;$('#panel').querySelectorAll('.ep').forEach(b=>b.onclick=()=>playPan(d.links[parseInt(b.dataset.i)]));}catch(e){$('#panel').innerHTML='<button class="btn" onclick="window.__closeMeijumi()">返回</button><div class="empty">详情失败：'+esc(e.message)+'</div>'}}
async function playPan(item){if(!item||!item.url)return;let u=item.url.replace(/&amp;/g,'&');if(window.fm&&fm.play){await fm.play(u,item.title);return}location.href=u}
function closeDetail(){$('#sheet').classList.remove('active')}
function search(q){q=clean(q);if(!q)return;loadPage(BASE+'/?s='+encodeURIComponent(q))}
$('#searchForm').onsubmit=e=>{e.preventDefault();search($('#kw').value)};
window.__closeMeijumi=closeDetail;
loadPage(BASE+'/');
})();
</script>
</body>
</html>
