<style>

der:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.9);font-size:13px;text-align:center;min-height:42px}.empty{padding:34px 18px;text-align:center;color:var(--muted);background:var(--soft);border:1px dashed var(--line);border-radius:var(--radius)}.pager{display:flex;gap:8px;justify-content:center;margin:14px 0}.pager button{padding:8px 16px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid var(--line);color:var(--text)}.mask{position:fixed;inset:0;display:none;z-index:60;background:rgba(0,0,0,.32);padding:18px;overflow:auto}.mask.active{display:block}.config{max-width:860px;margin:0 auto;background:rgba(34,39,48,.94);border:1px solid var(--line);border-radius:22px;padding:16px}.field{width:100%;min-height:38px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.08);color:var(--text);padding:8px 10px;outline:0}.row{display:grid;gap:6px;margin:10px 0}.row label{font-size:12px;color:var(--muted)}@media(min-width:720px){.grid{grid-template-columns:repeat(5,minmax(0,1fr))}.app{padding:18px 28px 44px}.head{grid-template-columns:180px 1fr}.pic{width:180px}.eps{grid-template-columns:repeat(4,minmax(0,1fr))}}@media(min-width:1100px){.grid{grid-template-columns:repeat(7,minmax(0,1fr))}.app{max-width:1380px;margin:0 auto}.sheet{max-width:1180px;margin:0 auto}}

<body>

<script>
(function(){
'use strict';
if(window.fongmiBridge||window.fm)document.documentElement.classList.add('fm-native');
const HOST='https://guangya.qsxy.top',PAN_HOST='https://www.guangyapan.com',PAN_API='https://api.guangyapan.com';
const UA='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/147.0.0.0 Safari/537.36 Edg/147.0.0.0';

let state={cat:'film',sub:'',order:'modified',page:1,last:[]},currentDetail=null;
let conf={comment:'感谢分享资源',siteCookie:'PHPSESSID=g1ikrqc0clhf17hsn90mjdouvb; Hm_lvt_e288361bdc3bae3de83404c11ca4163c=1780166375; HMACCOUNT=69A132C6EA295DB9; fps_accelerat=119; _lscache_vary=6b5a6e2f1f133446dd03fb7eccb2549c; wordpress_logged_in_b6997ac7fe182508e49782dcc938f14c=lubao%7C1782633183%7C6cTBf8mziSkZCXsdGLGlqWLd62VMpUmcsEALZ2UU8lX%7Ce8b41bf2de2096d909a17abd5129a771d3bb05c53aa62b99a55827e024a85cb8; theme_mode=white-theme; wfwaf-authcookie-6b5523459cf4b4ee764f5b3a64fd7daa=1564%7Csubscriber%7Cread%7C57f1048faebb8916c630470e3c6130775547bd3679793e5bbaee8a88a14a1308; Hm_lpvt_e288361bdc3bae3de83404c11ca4163c=1781710827',panAuth:''};
const $=s=>document.querySelector(s),content=$('#content'),status=$('#status'),tabs=$('#tabs'),chips=$('#chips');
function esc(s){return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'"'}[c]))}
function decode(s){let t=document.createElement('textarea');t.innerHTML=String(s||'');return t.value}
function clean(s){return decode(String(s||'')).replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim()}
function strip(s){return clean(s).replace(/[-—–]\s*光鸭.*$/i,'').replace(/-clearlogo$/i,'').trim()}
function abs(u,b=HOST){try{return new URL(decode(String(u||'').trim()),b+'/').href}catch(e){return u||''}}
function trimSlash(s){return String(s||'').replace(/\/+$/,'')}
function img(u){u=abs(u);if(u.startsWith('http://'))u='https://'+u.slice(7);return u}
function parseHtml(h){return new DOMParser().parseFromString(h,'text/html')}
function headers(ref=HOST+'/',json=false,auth=false){let h={'User-Agent':UA,'Accept-Language':'zh-CN,zh;q=0.9',Referer:ref};if(json){h.Accept='application/json, text/plain, */*';h['Content-Type']='application/json;charset=UTF-8';h.Origin=PAN_HOST;h.dt='4'}else if(conf.siteCookie)h.Cookie=conf.siteCookie;if(auth&&conf.panAuth)h.Authorization=/^Bearer\s+/i.test(conf.panAuth)?conf.panAuth:'Bearer '+conf.panAuth;return h}
async function req(url,opt={}){status.textContent='加载：'+url;let hs=opt.headers||headers(opt.referer);if(window.fm&&fm.req){let r=await fm.req(url,{method:opt.method||'GET',headers:hs,body:opt.body,responseType:'text',timeout:opt.timeout||25,credentials:'include'});if(!r.ok)throw new Error(r.error||('HTTP '+r.status));return r.body||''}let r=await fetch(url,{method:opt.method||'GET',headers:hs,body:opt.body,credentials:'include'});return await r.text()}
async function postPan(path,body={},auth=false,ref=PAN_HOST+'/'){let t=await req(/^https?:/.test(path)?path:PAN_API+path,{method:'POST',headers:headers(ref,true,auth),body:JSON.stringify(body),timeout:25});let j=JSON.parse(t||'{}');let code=Number(j.code||0);if(code!==0)throw new Error(j.msg||'光鸭云盘接口失败');return j.data||{}}
function renderTabs(){tabs.innerHTML=CATS.map(x=>`<button class="tab ${state.cat===x[0]?'active':''}" data-id="${x[0]}">${x[1]}</button>`).join('');tabs.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{state.cat=b.dataset.id;state.sub='';state.order='modified';state.page=1;loadCategory()})}
function renderChips(){let sub=(SUBS[state.cat]||[]).map(x=>`<button class="chip ${state.sub===x[0]?'active':''}" data-t="sub" data-id="${x[0]}">${x[1]}</button>`).join('');let ord=ORDERS.map(x=>`<button class="chip ${state.order===x[0]?'active':''}" data-t="order" data-id="${x[0]}">${x[1]}</button>`).join('');chips.innerHTML=sub+ord;chips.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{if(b.dataset.t==='sub')state.sub=b.dataset.id;else state.order=b.dataset.id;state.page=1;loadCategory()})}
function cardHtml(v,i){return`<article class="card" data-i="${i}"><div class="poster">${v.vod_pic?`<img loading="lazy" referrerpolicy="no-referrer" src="${esc(v.vod_pic)}">`:'<div class="noimg">光</div>'}<span class="badge">${esc(v.vod_remarks||'资源')}</span></div><div class="meta"><div class="name">${esc(v.vod_name)}</div><div class="remark">${esc(v.vod_content||v.vod_remarks||'点击查看')}</div></div></article>`}
function renderGrid(list,pager=true){state.last=list;if(!list.length){content.innerHTML='<div class="empty">暂无内容</div>';return}content.innerHTML=`<div class="grid">${list.map(cardHtml).join('')}</div>${pager?`<div class="pager"><button id="prev" ${state.page<=1?'disabled':''}>上一页</button><button id="next">下一页</button></div>`:''}`;content.querySelectorAll('.card').forEach(c=>c.onclick=()=>openDetail(list[parseInt(c.dataset.i)]));let p=$('#prev'),n=$('#next');if(p)p.onclick=()=>{if(state.page>1){state.page--;loadCategory()}};if(n)n.onclick=()=>{state.page++;loadCategory()}}
function pickImg(card){let im=card.querySelector('.item-thumbnail img,.graphic img,img');return img(im&&(im.getAttribute('data-src')||im.getAttribute('data-original')||im.getAttribute('src'))||'')}
function vod(id,title,pic,remarks,content){return{vod_id:id,vod_name:strip(title)||'未命名资源',vod_pic:pic||'',vod_remarks:clean(remarks),vod_content:clean(content)}}
function noAccess(h){return /暂无查看此内容的权限|内容已隐藏，请登录后查看|登录后继续查看|login-register|登录注册/i.test(String(h||''))}
function extractPosts(d){let list=[],seen=new Set();let sels='posts.posts-item.list.ajax-item.flex,.posts-item.list.ajax-item.flex,.posts-item,article.post,.ajax-item.flex,.item-list .item,.post-list .item';d.querySelectorAll(sels).forEach(card=>{let a=card.querySelector('h2.item-heading a,.item-heading a,.entry-title a,.term-title a,a[href$=".html"]');let href=abs(a&&a.getAttribute('href'));let title=strip((a&&a.textContent)||card.querySelector('img')?.getAttribute('alt')||a?.getAttribute('title')||'');if(!href||!title||seen.has(href)||!/\.html(\?|$)/.test(href))return;seen.add(href);let excerpt=clean(card.querySelector('.item-excerpt,.excerpt,.summary,.desc')?.textContent||'');let meta=clean(card.querySelector('.item-meta,.meta,.badg,.px12')?.textContent||'');list.push(vod(href,title,pickImg(card),meta,excerpt))});if(!list.length)d.querySelectorAll('a[href$=".html"]').forEach(a=>{let box=a.closest('.posts-item,article,li,div')||a,href=abs(a.getAttribute('href')),title=strip(a.textContent||a.getAttribute('title')||a.querySelector('img')?.getAttribute('alt')||'');if(!href||!title||seen.has(href)||/登录|注册|找回|关于|免责声明|广告合作/.test(title))return;seen.add(href);list.push(vod(href,title,pickImg(box),'',''))});return list}
function extractTerms(d){let list=[],seen=new Set();d.querySelectorAll('.hover-zoom-img,.term-title').forEach(card=>{let a=card.querySelector('.term-title a[href$=".html"],a[href$=".html"]');let href=abs(a&&a.getAttribute('href'));let title=strip((a&&a.textContent)||card.querySelector('img')?.getAttribute('alt')||'');if(!href||!title||seen.has(href))return;seen.add(href);list.push(vod(href,title,pickImg(card),clean(card.querySelector('.px12 span,.badg')?.textContent||''),''))});return list}
function dedupe(a){let s=new Set(),o=[];(a||[]).forEach(x=>{let k=x.vod_id;if(k&&!s.has(k)){s.add(k);o.push(x)}});return o}
function catUrl(){let path=[state.cat,state.sub].filter(Boolean).join('/');let base=HOST+'/category/'+path+(state.page>1?'/page/'+state.page:'');return base+'?orderby='+encodeURIComponent(state.order)}
async function loadHome(){renderTabs();renderChips();content.innerHTML='<div class="empty">加载首页…</div>';try{let h=await req(HOST+'/',{referer:HOST+'/'}),d=parseHtml(h);let list=dedupe(extractPosts(d).concat(extractTerms(d))).slice(0,30);renderGrid(list,false);status.textContent='首页 '+list.length+' 条'}catch(e){content.innerHTML='<div class="empty">首页失败：'+esc(e.message)+'</div>'}}
async function loadCategory(){renderTabs();renderChips();content.innerHTML='<div class="empty">加载分类…</div>';try{let h=await req(catUrl(),{referer:HOST+'/'});if(noAccess(h)){content.innerHTML='<div class="empty">当前 Cookie 未生效或账号无权限。请重新复制浏览器完整 Cookie 到配置里，保存后刷新。</div>';status.textContent='无权限/未登录';return}let d=parseHtml(h);let list=extractPosts(d);renderGrid(list,true);status.textContent=`${(CATS.find(x=>x[0]===state.cat)||[])[1]} 第 ${state.page} 页 · ${list.length} 条`}catch(e){content.innerHTML='<div class="empty">分类失败：'+esc(e.message)+'</div>'}}
async function search(q){q=clean(q);if(!q)return;chips.innerHTML='';content.innerHTML='<div class="empty">搜索中…</div>';try{let h=await req(HOST+'/?s='+encodeURIComponent(q)+'&type=post',{referer:HOST+'/'}),d=parseHtml(h);let list=dedupe(extractPosts(d).concat(extractTerms(d))).filter(x=>(x.vod_name+x.vod_content+x.vod_remarks).toLowerCase().includes(q.toLowerCase()));renderGrid(list,false);status.textContent='搜索 '+q+' · '+list.length+' 条'}catch(e){content.innerHTML='<div class="empty">搜索失败：'+esc(e.message)+'</div>'}}
function normalizeShare(u){u=decode(String(u||'').trim()).replace(/\//g,'/');if(/golink=/.test(u)){try{let q=(new URL(u,HOST+'/')).searchParams.get('golink')||'';q=q.replace(/-/g,'+').replace(/_/g,'/');q+='='.repeat((4-q.length%4)%4);u=atob(q)}catch(e){}}let m=u.match(/(?:https?:\/\/)?(?:www\.)?guangyapan\.com\/s\/([A-Za-z0-9_-]+)(?:[^\s"'<>]*)?/i);if(!m)return'';let r=PAN_HOST+'/s/'+m[1],c=u.match(/[?&](?:code|pwd)=([^&\s"'<>]+)/i);if(c)r+='?code='+encodeURIComponent(decodeURIComponent(c[1]));return r}
function shareId(u){let m=String(u||'').match(/\/s\/([^/?#]+)/);return m?m[1]:''}
function shareCode(u){try{let x=new URL(u);return x.searchParams.get('code')||x.searchParams.get('pwd')||''}catch(e){return''}}
function extractShares(d,h){let out=[],seen=new Set();function push(u,t){u=normalizeShare(u);if(!u||seen.has(u))return;seen.add(u);out.push({shareURL:u,shareId:shareId(u),code:shareCode(u),title:strip(t)||'光鸭云盘资源'})}d.querySelectorAll('.tinymce-hide a,.wp-posts-content a,[data-clipboard-text],[data-url],[data-link],[data-href],.comment-body a,.comment-content a,#comments a').forEach(a=>{let t=a.getAttribute('title')||a.textContent||a.closest('li,p,div')?.textContent||'光鸭云盘资源';[a.getAttribute('href'),a.getAttribute('data-clipboard-text'),a.getAttribute('data-url'),a.getAttribute('data-link'),a.getAttribute('data-href'),a.textContent].forEach(x=>push(x,t))});(decode(h).match(/https?:\/\/[^\s"'<>]*guangyapan\.com\/s\/[^\s"'<>]+/ig)||[]).forEach(x=>push(x,'光鸭云盘资源'));return out}
function hiddenContent(h){return /此处内容已隐藏|reply-show|hidden-box|评论后|回复后/i.test(String(h||''))}
function formValue(h,name){let r=new RegExp("name=[\"']"+name+"[\"'][^>]*value=[\"']([^\"']*)","i"),m=String(h||"").match(r);if(m)return m[1];r=new RegExp("value=[\"']([^\"']*)[\"'][^>]*name=[\"']"+name+"[\"']","i");m=String(h||"").match(r);return m?m[1]:""}
function formHeaders(ref){let h=headers(ref);h.Origin=HOST;h['X-Requested-With']='XMLHttpRequest';h['Content-Type']='application/x-www-form-urlencoded; charset=UTF-8';h.Accept='application/json, text/javascript, */*; q=0.01';return h}
async function unlockByComment(url,h){if(!conf.siteCookie||!hiddenContent(h))return h;status.textContent='检测到隐藏内容，正在自动评论解锁…';let pid=formValue(h,'comment_post_ID')||formValue(h,'postid')||formValue(h,'post_id'),parent=formValue(h,'comment_parent')||'0',nonce=formValue(h,'_wpnonce')||formValue(h,'post_action_nonce');let am=String(h||'').match(/(?:ajax-href|data-ajax|action)=["']([^"']+)/i);let target=am?abs(am[1],HOST+'/'):HOST+'/wp-admin/admin-ajax.php';let data=new URLSearchParams();data.set('comment',conf.comment||'感谢分享资源');data.set('comment_post_ID',pid);data.set('comment_parent',parent);data.set('action','submit_comment');if(nonce){data.set('_wpnonce',nonce);data.set('post_action_nonce',nonce)}for(let u of [target,HOST+'/wp-comments-post.php']){try{await req(u,{method:'POST',headers:formHeaders(url),body:data.toString(),referer:url,timeout:20});let h2=await req(url,{referer:url});if(h2&&!hiddenContent(h2))return h2}catch(e){}}return h}
function metaFrom(d,url){let title=strip(d.querySelector('h1.article-title a,h1.article-title')?.textContent||d.querySelector('meta[property="og:title"]')?.content||d.title||'光鸭资源');let pic=img(d.querySelector('.wp-posts-content img')?.getAttribute('data-full-url')||d.querySelector('.wp-posts-content img')?.getAttribute('data-src')||d.querySelector('.wp-posts-content img')?.getAttribute('src')||d.querySelector('meta[property="og:image"]')?.content||'');let node=d.querySelector('.article-content .wp-posts-content')||d.body;let clone=node.cloneNode(true);clone.querySelectorAll('.tinymce-hide,.hidden-box,.hidden-text,script,style').forEach(x=>x.remove());return vod(url,title,pic,clean(d.querySelector('.article-header [title*="发布"]')?.getAttribute('title')||''),clean(clone.textContent||d.querySelector('meta[name="description"]')?.content||''))}
async function getAccess(share){return await postPan('/userres/v1/get_share_access_token',share.code?{shareId:share.shareId,code:share.code}:{shareId:share.shareId},false,share.shareURL)}
async function listFiles(accessToken,parentId=''){let out=[],cursor;for(let i=0;i<20;i++){let body={accessToken,pageSize:200,orderBy:0,sortType:0,parentId};if(cursor)body.cursor=cursor;let data=await postPan('/userres/v1/get_share_page_files_list',body,false,PAN_HOST+'/');let list=Array.isArray(data.list)?data.list:[];out.push(...list);if(!data.cursor||!list.length||data.cursor===cursor)break;cursor=data.cursor}return out}
function isFolder(x){return Number(x&&x.resType||0)===2}
function isIso(x){let n=String(x&&x.fileName||'').toLowerCase(),e=String(x&&x.ext||'').toLowerCase().replace(/^\./,'');return n.endsWith('.iso')||e==='iso'||/原盘|蓝光|blu[- ]?ray|bdmv/i.test(x&&x.fileName||'')}
function isVideo(x){if(Number(x&&x.resType||0)!==1)return false;let n=String(x.fileName||'').toLowerCase(),e=String(x.ext||'').toLowerCase(),m=String(x.mineType||x.mimeType||'').toLowerCase();return VIDEO_EXT.some(s=>n.endsWith(s)||e===s||e===s.slice(1))||m.includes('video')||isIso(x)}
function gcid(x){let m=String(x||'').match(/screenshot-thumbnails\/([A-Fa-f0-9]{20,})\//);return m?m[1]:''}
function size(n){n=Number(n||0);if(!n)return'';if(n<1024**2)return(n/1024).toFixed(1)+'KB';if(n<1024**3)return(n/1024**2).toFixed(1)+'MB';return(n/1024**3).toFixed(2)+'GB'}
function stripExt(s){return String(s||'').replace(/\.[^.]+$/,'')}
function epName(f,i,total){let raw=strip(stripExt(f.fileName||'')),m=raw.match(/S\d{1,2}E(\d{1,3})/i)||raw.match(/第\s*(\d{1,4})\s*[集话期]/)||raw.match(/EP?(\d{1,3})/i);let name=isIso(f)?'ISO原盘-'+(raw||'原盘'):(total===1?'正片':m?('第'+Number(m[1])+'集'):(raw||'资源'+(i+1)));let z=size(f.fileSize);return z?name+' ['+z+']':name}
async function collectVideos(shareId,accessToken,parentId='',depth=0,vis=new Set()){if(depth>4||vis.has(parentId||'root'))return[];vis.add(parentId||'root');let items=await listFiles(accessToken,parentId),res=[];for(let it of items){if(isVideo(it)){res.push({shareId,fileId:String(it.fileId||''),fileName:String(it.fileName||''),fileSize:Number(it.fileSize||0),gcid:gcid(it.thumbnail||it.gcid||''),thumbnail:String(it.thumbnail||''),originalDisc:isIso(it)});continue}if(isFolder(it)){let ch=await collectVideos(shareId,accessToken,String(it.fileId||''),depth+1,vis);res.push(...ch)}}return res}
function playId(meta){return JSON.stringify(meta||{})}
async function openDetail(v){$('#sheet').classList.add('active');$('#panel').innerHTML='<div class="empty">读取详情…</div>';try{let h0=await req(v.vod_id,{referer:HOST+'/'}),h=await unlockByComment(v.vod_id,h0),d=parseHtml(h),m=metaFrom(d,v.vod_id),shares=extractShares(d,h),lines=[];for(let s of shares){try{let token=await getAccess(s),at=String(token.accessToken||'');let files=at?await collectVideos(s.shareId,at):[];if(!files.length){lines.push({name:s.title,eps:[{name:'推送光鸭分享',url:'push://'+s.shareURL,share:s.shareURL}]});continue}lines.push({name:s.title,eps:files.map((f,i)=>({name:epName(f,i,files.length),url:playId({detailId:v.vod_id,shareId:s.shareId,shareURL:s.shareURL,code:s.code||'',fileId:f.fileId,gcid:f.gcid,fileName:f.fileName,episodeName:epName(f,i,files.length),pic:f.thumbnail||'',originalDisc:!!f.originalDisc})}))})}catch(e){lines.push({name:s.title||'光鸭分享',eps:[{name:'打开分享页',url:'push://'+s.shareURL,share:s.shareURL}]})}}if(!lines.length)lines=[{name:'详情页',eps:[{name:'打开详情页',url:v.vod_id}]}];currentDetail={vod:m,lines};$('#panel').innerHTML=`<button class="btn" id="closeBtn">返回</button><div class="head"><img class="pic" referrerpolicy="no-referrer" src="${esc(m.vod_pic)}" onerror="this.style.display='none'"><div><div class="title">${esc(m.vod_name)}</div><div class="info"><div><b>来源：</b>光鸭·臻影社</div><div><b>资源：</b>${lines.length} 条线路</div></div></div></div><div class="pill">简介</div><div class="desc">${esc(m.vod_content||'暂无简介')}</div><div class="pill">播放线路</div><div class="line-tabs" id="lineTabs">${lines.map((x,i)=>`<button class="line-tab ${i===0?'active':''}" data-i="${i}">${esc(x.name)}(${x.eps.length})</button>`).join('')}</div><div class="eps" id="eps"></div>`;$('#closeBtn').onclick=closeDetail;$('#lineTabs').querySelectorAll('.line-tab').forEach(b=>b.onclick=()=>{$('#lineTabs').querySelectorAll('.line-tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderEpisodes(parseInt(b.dataset.i))});renderEpisodes(0)}catch(e){$('#panel').innerHTML='<button class="btn" onclick="window.__gyClose()">返回</button><div class="empty">详情失败：'+esc(e.message)+'</div>'}}
function renderEpisodes(li){let ln=currentDetail.lines[li],box=$('#eps');box.innerHTML=(ln.eps||[]).map((e,i)=>`<button class="ep" data-li="${li}" data-ei="${i}">${esc(e.name)}</button>`).join('')||'<div class="empty">暂无资源</div>';box.querySelectorAll('.ep').forEach(b=>b.onclick=()=>playEpisodeFull(parseInt(b.dataset.li),parseInt(b.dataset.ei),b.textContent))}
function parseMeta(s){try{return JSON.parse(s)}catch(e){return null}}
async function resolvePlay(e){let u=e.url||'';if(u.startsWith('push://')||/^https?:/.test(u))return u;let meta=parseMeta(u);if(!meta)return u;if(meta.originalDisc)return 'push://'+(meta.shareURL||'');try{let data=await postPan('/userres/v1/get_share_download_url',{accessToken:(await getAccess({shareId:meta.shareId,code:meta.code||'',shareURL:meta.shareURL})).accessToken,fileId:meta.fileId},false,meta.shareURL);if(data.downloadUrl)return data.downloadUrl}catch(err){}try{if(conf.panAuth&&meta.gcid){let data=await postPan('/userres/v1/file/get_vod_download_url',{fileId:meta.fileId,gcid:meta.gcid},true,meta.shareURL);if(data.signedURL)return data.signedURL}}catch(err){}return 'push://'+(meta.shareURL||'')}
async function resolveLine(ln){for(let e of ln.eps||[]){if(!e.real)e.real=await resolvePlay(e)}}
async function playEpisodeFull(li,ei,mark){let d=currentDetail&&currentDetail.vod,lines=currentDetail&&currentDetail.lines||[];if(!d||!lines.length)return;let ln=lines[li]||lines[0],cur=ln.eps[ei]||ln.eps[0];await resolveLine(ln);let real=cur.real||await resolvePlay(cur);let from=[],urls=[];lines.forEach(x=>{from.push(x.name);urls.push((x.eps||[]).map(e=>`${e.name}$${e.real||e.url}`).join('#'))});let native=(ln.eps||[]).map(e=>({name:e.name,url:e.real||e.url}));if(window.fm&&typeof fm.vodInline==='function'){await fm.vodInline({vod_id:d.vod_id,vod_name:d.vod_name,vod_pic:d.vod_pic,vod_remarks:d.vod_remarks,vod_content:d.vod_content,vod_play_from:from.join('$$$'),vod_play_url:urls.join('$$$'),play_from:ln.name,mark:mark||cur.name,episodes:native,url:real});return}if(window.fm&&fm.play){await fm.play(real,d.vod_name+' '+(mark||cur.name));return}location.href=real}
function closeDetail(){$('#sheet').classList.remove('active')}
function loadConf(){try{conf=Object.assign(conf,JSON.parse(localStorage.getItem('gy_cfg')||'{}'))}catch(e){}$('#siteCookie').value=conf.siteCookie||'';$('#panAuth').value=conf.panAuth||'';$('#commentText').value=conf.comment||'感谢分享资源'}
$('#searchForm').onsubmit=e=>{e.preventDefault();search($('#kw').value)};$('#cfgBtn').onclick=()=>{$('#mask').classList.add('active');loadConf()};$('#closeCfg').onclick=()=>$('#mask').classList.remove('active');$('#saveCfg').onclick=()=>{conf.siteCookie=$('#siteCookie').value.trim();conf.panAuth=$('#panAuth').value.trim();conf.comment=$('#commentText').value.trim()||'感谢分享资源';localStorage.setItem('gy_cfg',JSON.stringify(conf));$('#mask').classList.remove('active');status.textContent='配置已保存'};window.__gyClose=closeDetail;loadConf();renderTabs();renderChips();loadHome();
})();
</script>
